name: Deploy backend (Cloud Run)

# main への push でバックエンドをビルド→Artifact Registry→Cloud Run へデプロイ。
# 認証は WIF（キーレス）。下記の値は `terraform output` から取得し、リポジトリの
# Variables / Secrets に設定する:
#   vars.WIF_PROVIDER  = terraform output -raw wif_provider
#   vars.DEPLOY_SA     = terraform output -raw github_deployer_sa_email
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  PROJECT_ID: marketing-mail-generator
  REGION: asia-northeast1
  SERVICE: mmg-api
  REPO: mmg

permissions:
  contents: read
  id-token: write # WIF に必須

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        working-directory: backend
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE}:${GITHUB_SHA}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}"
