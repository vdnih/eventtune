name: Continuous Integration

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend Test (Python)
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: marketing-mail-generator
      FIREBASE_PROJECT_ID: marketing-mail-generator
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .

      - name: Run Pytest (unit)
        working-directory: backend
        run: uv run pytest

  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://dummy-api.local
      NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyAyvwqPprZZick_OsyxnTfsStWAMb_rhhw
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: marketing-mail-generator.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: marketing-mail-generator
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: marketing-mail-generator.firebasestorage.app
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "974233950009"
      NEXT_PUBLIC_FIREBASE_APP_ID: 1:974233950009:web:75bbffb7465a269bf8bae8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint check
        working-directory: frontend
        run: npm run lint

      - name: Build project
        working-directory: frontend
        run: npm run build
