name: Continuous Integration

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Run Pytest
        working-directory: backend
        run: uv run pytest

  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint check
        working-directory: frontend
        run: npm run lint

      - name: Build project
        working-directory: frontend
        run: npm run build
