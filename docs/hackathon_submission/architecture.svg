<svg xmlns="http://www.w3.org/2000/svg" width="960" height="780" viewBox="0 0 960 780" font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5f6b7a"/>
    </marker>
    <style>
      .title{font-size:22px;font-weight:700;fill:#1a2330}
      .subtitle{font-size:12px;fill:#5f6b7a}
      .boxh{font-size:14px;font-weight:700;fill:#1a2330}
      .agenth{font-size:12px;font-weight:700;fill:#1a2330}
      .boxt{font-size:11px;fill:#42505f}
      .tech{font-size:10px;fill:#5f6b7a}
      .caption{font-size:11px;font-weight:700;fill:#5f6b7a}
      .band{font-size:13px;font-weight:700;fill:#1a2330}
      .chip{font-size:11px;fill:#1a2330}
      .alabel{font-size:9.5px;fill:#5f6b7a}
      .region{font-size:9px;font-weight:700;fill:#5f6b7a}
      .note{font-size:9.5px;font-style:italic;fill:#7a8694}
    </style>
  </defs>

  <rect width="960" height="780" fill="#f7f9fc"/>

  <!-- Header -->
  <text x="32" y="40" class="title">EventTune — システム構成図（インフラ／ソフトウェア）</text>
  <text x="32" y="62" class="subtitle">カオスなイベントデータをオントロジーへ統合し、2種類のAIエージェントがその上で働くマルチテナントSaaS</text>

  <!-- ============ Layer 1: Client + Firebase Auth ============ -->
  <g>
    <rect x="32" y="84" width="564" height="76" rx="10" fill="#e8f0fe" stroke="#4285f4"/>
    <text x="48" y="108" class="boxh">① クライアント（ブラウザ / BtoBマーケ担当）</text>
    <text x="48" y="130" class="boxt">Next.js 15 App Router ・ React 19 ・ TypeScript ・ Tailwind CSS</text>
    <text x="48" y="148" class="tech">チャット駆動UI ／ ファイルのドラッグ＆ドロップ投入 ／ SSEストリーミング受信</text>
  </g>
  <g>
    <rect x="636" y="84" width="292" height="76" rx="10" fill="#f3e8fd" stroke="#a142f4"/>
    <text x="652" y="108" class="boxh">Firebase Authentication</text>
    <text x="652" y="130" class="boxt">Google サインイン ／ 匿名認証</text>
    <text x="652" y="148" class="tech">IDトークンを発行 → 全APIで検証</text>
  </g>
  <!-- client -> auth -->
  <line x1="596" y1="122" x2="634" y2="122" stroke="#5f6b7a" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="600" y="115" class="alabel">認証</text>

  <!-- client -> app hosting -->
  <line x1="110" y1="160" x2="110" y2="188" stroke="#5f6b7a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="120" y="178" class="alabel">HTTPS ／ SSR</text>

  <!-- ============ Layer 2: Firebase App Hosting ============ -->
  <g>
    <rect x="32" y="190" width="564" height="72" rx="10" fill="#e8f0fe" stroke="#4285f4"/>
    <text x="48" y="214" class="boxh">② Firebase App Hosting</text>
    <rect x="486" y="200" width="102" height="17" rx="8" fill="#ffffff" stroke="#4285f4"/>
    <text x="537" y="213" text-anchor="middle" class="region">asia-east1</text>
    <text x="48" y="236" class="boxt">Next.js SSR ホスティング ／ git push で自動ビルド＆デプロイ</text>
    <text x="48" y="253" class="tech">/api/v1/* を Cloud Run へ SSR リバースプロキシ</text>
  </g>

  <!-- app hosting -> cloud run -->
  <line x1="110" y1="262" x2="110" y2="290" stroke="#5f6b7a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="120" y="280" class="alabel">REST + SSE ／ Bearer &lt;IDトークン&gt; + X-Space-Id</text>

  <!-- ============ Layer 3: Cloud Run (backend + agents) ============ -->
  <g>
    <rect x="32" y="292" width="564" height="210" rx="10" fill="#e6f4ea" stroke="#34a853"/>
    <text x="48" y="316" class="boxh">③ Cloud Run: eventtune-api</text>
    <rect x="470" y="302" width="118" height="17" rx="8" fill="#ffffff" stroke="#34a853"/>
    <text x="529" y="315" text-anchor="middle" class="region">asia-northeast1</text>
    <text x="48" y="336" class="boxt">FastAPI ・ Python 3.12 ・ Docker</text>
    <text x="48" y="354" class="tech">routers: integration ・ marketing ・ spaces ・ data ・ users　｜　マルチテナント: spaces/&#123;space_id&#125;/… で分離</text>

    <!-- DataIntegrationAgent -->
    <rect x="48" y="368" width="262" height="124" rx="8" fill="#ffffff" stroke="#34a853"/>
    <text x="60" y="388" class="agenth">DataIntegrationAgent</text>
    <text x="60" y="407" class="boxt">取り込みパイプライン（Layer 1）</text>
    <text x="60" y="424" class="tech">google-genai 直接呼び出し（決定論）</text>
    <text x="60" y="440" class="tech">CSV/Excel/PDF → OSIオントロジー</text>
    <text x="60" y="456" class="tech">gemini-3.5-flash / 3.1-flash-lite</text>
    <text x="60" y="472" class="tech">appeal_summary → appeal_vector</text>

    <!-- MarketingAgent -->
    <rect x="320" y="368" width="262" height="124" rx="8" fill="#ffffff" stroke="#34a853"/>
    <text x="332" y="388" class="agenth">MarketingAgent</text>
    <text x="332" y="407" class="boxt">分析・成果物生成（Layer 3）</text>
    <text x="332" y="424" class="tech">Google ADK Agent（Runner + Session）</text>
    <text x="332" y="440" class="tech">セグメント／成果物(メール等)を決定論組立</text>
    <text x="332" y="456" class="tech">gemini-3.5-flash</text>
    <text x="332" y="472" class="tech">run_python_code で Code Interpreter 実行</text>
  </g>

  <!-- ============ Right column: AI 基盤 (Vertex AI) ============ -->
  <text x="636" y="286" class="caption">AI基盤 — Vertex AI</text>
  <g>
    <rect x="636" y="292" width="292" height="100" rx="10" fill="#fef7e0" stroke="#f9ab00"/>
    <text x="652" y="316" class="boxh">Vertex AI ・ Gemini</text>
    <rect x="852" y="302" width="60" height="17" rx="8" fill="#ffffff" stroke="#f9ab00"/>
    <text x="882" y="315" text-anchor="middle" class="region">global</text>
    <text x="652" y="337" class="boxt">生成・埋め込みの直接API呼び出し</text>
    <text x="652" y="354" class="tech">gemini-3.5-flash / gemini-3.1-flash-lite</text>
    <text x="652" y="370" class="tech">gemini-embedding-001（768次元）</text>
    <text x="652" y="386" class="note">← 両エージェントが呼び出し</text>
  </g>
  <g>
    <rect x="636" y="400" width="292" height="102" rx="10" fill="#fef7e0" stroke="#f9ab00"/>
    <text x="652" y="424" class="boxh">Vertex AI Agent Engine</text>
    <rect x="838" y="410" width="74" height="17" rx="8" fill="#ffffff" stroke="#f9ab00"/>
    <text x="875" y="423" text-anchor="middle" class="region">us-central1</text>
    <text x="652" y="445" class="boxt">① ADK 会話セッションストア</text>
    <text x="652" y="462" class="boxt">② Code Interpreter サンドボックス</text>
    <text x="652" y="478" class="tech">pandas 分析を statefully 実行</text>
    <text x="652" y="494" class="note">← MarketingAgent 専用</text>
  </g>
  <!-- cloud run -> vertex gemini -->
  <line x1="596" y1="332" x2="634" y2="332" stroke="#5f6b7a" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- marketing agent -> agent engine -->
  <line x1="596" y1="452" x2="634" y2="450" stroke="#5f6b7a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- cloud run -> data -->
  <line x1="150" y1="502" x2="150" y2="528" stroke="#5f6b7a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="156" y="520" class="alabel">書込／読取</text>
  <line x1="440" y1="502" x2="440" y2="528" stroke="#5f6b7a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="446" y="520" class="alabel">ファイル保存／取得</text>
  <!-- artifact registry -> cloud run (deploy image) -->
  <line x1="700" y1="530" x2="594" y2="504" stroke="#5f6b7a" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="612" y="520" class="alabel">イメージ</text>

  <!-- ============ Layer 4: Data stores ============ -->
  <g>
    <rect x="32" y="530" width="272" height="94" rx="10" fill="#fce8e6" stroke="#ea4335"/>
    <text x="48" y="554" class="boxh">Firestore</text>
    <rect x="186" y="540" width="110" height="17" rx="8" fill="#ffffff" stroke="#ea4335"/>
    <text x="241" y="553" text-anchor="middle" class="region">asia-northeast1</text>
    <text x="48" y="576" class="boxt">OSI: マスタ(person/product/event/content)</text>
    <text x="48" y="592" class="tech">＋ ファクト(attendance / interest)・スレッド／メッセージ</text>
    <text x="48" y="608" class="tech">全コレクションを spaces/&#123;space_id&#125;/… でテナント分離</text>
  </g>
  <g>
    <rect x="316" y="530" width="276" height="94" rx="10" fill="#fce8e6" stroke="#ea4335"/>
    <text x="332" y="554" class="boxh">Cloud Storage</text>
    <rect x="474" y="540" width="110" height="17" rx="8" fill="#ffffff" stroke="#ea4335"/>
    <text x="529" y="553" text-anchor="middle" class="region">asia-northeast1</text>
    <text x="332" y="576" class="boxt">アップロードファイル置き場 uploads/&#123;uid&#125;/…</text>
    <text x="332" y="592" class="tech">ファイル投入の一次バケット</text>
    <text x="332" y="608" class="tech">7日ライフサイクルで自動削除</text>
  </g>
  <g>
    <rect x="636" y="530" width="292" height="94" rx="10" fill="#fce8e6" stroke="#ea4335"/>
    <text x="652" y="554" class="boxh">Artifact Registry</text>
    <rect x="810" y="540" width="110" height="17" rx="8" fill="#ffffff" stroke="#ea4335"/>
    <text x="865" y="553" text-anchor="middle" class="region">asia-northeast1</text>
    <text x="652" y="576" class="boxt">バックエンド Docker イメージを格納</text>
    <text x="652" y="592" class="tech">Cloud Run デプロイ元</text>
  </g>

  <!-- ============ Layer 5: CI/CD + IaC ============ -->
  <g>
    <rect x="32" y="646" width="896" height="82" rx="10" fill="#ffffff" stroke="#c7d2e0"/>
    <text x="48" y="670" class="band">つくる・まわす — CI/CD ・ IaC（Infrastructure as Code）</text>
    <rect x="48" y="682" width="214" height="30" rx="6" fill="#eef2f7" stroke="#c7d2e0"/>
    <text x="155" y="701" text-anchor="middle" class="chip">Terraform（IaC / GCS remote state）</text>
    <rect x="274" y="682" width="300" height="30" rx="6" fill="#eef2f7" stroke="#c7d2e0"/>
    <text x="424" y="701" text-anchor="middle" class="chip">GitHub Actions ＋ WIF（キーレスCI/CD）</text>
    <rect x="586" y="682" width="168" height="30" rx="6" fill="#eef2f7" stroke="#c7d2e0"/>
    <text x="670" y="701" text-anchor="middle" class="chip">→ Cloud Run へデプロイ</text>
    <rect x="766" y="682" width="150" height="30" rx="6" fill="#eef2f7" stroke="#c7d2e0"/>
    <text x="841" y="701" text-anchor="middle" class="chip">App Hosting は git push 自動</text>
  </g>

  <!-- Region legend -->
  <text x="32" y="752" class="tech">リージョン:　asia-northeast1（Cloud Run / Firestore / Storage / Artifact Registry）　｜　asia-east1（App Hosting）　｜　global（Gemini）　｜　us-central1（Agent Engine）</text>
</svg>
